<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>5.2 智能安全防护平台</title>
<style>
:root{--sidebar-w:260px;--accent:#ef4444;--accent-strong:#dc2626;--accent-coral:#ef6b4a;--accent-bg:rgba(239,68,68,0.1);--border:#eee5df;--text:#696363;--text-h:#171212}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{display:flex;font-family:"Segoe UI Variable","Segoe UI","SF Pro Text",system-ui,sans-serif;background:#f8f5f2;margin:0}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);height:100vh;display:flex;flex-direction:column;background:linear-gradient(180deg,rgba(255,255,255,0.94),rgba(255,248,244,0.92));border-right:1px solid #eadfd8;box-shadow:18px 0 50px -44px rgba(72,44,24,0.45);overflow:hidden;flex-shrink:0}
.sidebar-logo{height:80px;border-bottom:1px solid #efe2da;display:flex;flex-direction:column;justify-content:center;padding:0 24px;flex-shrink:0}
.sidebar-logo .eyebrow{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.22em;color:#b46c50;margin-bottom:2px}
.sidebar-logo .title{font-size:1.15rem;font-weight:700;background:linear-gradient(135deg,#ef6b4a,#dc2626);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sidebar-nav{flex:1;padding:12px;overflow-y:auto}
.sidebar-nav::-webkit-scrollbar{width:4px}
.sidebar-nav::-webkit-scrollbar-thumb{background:#d4c8c0;border-radius:4px}
.nav-section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.18em;color:#b46c50;padding:16px 16px 6px}
.nav-item{display:flex;align-items:center;gap:10px;border-radius:14px;padding:9px 14px;font-size:13px;font-weight:500;color:#6e6763;transition:all .2s;cursor:pointer;margin-bottom:1px}
.nav-item:hover{background:rgba(247,236,230,0.82);color:var(--text-h)}
.nav-item.active{background:rgba(255,241,235,0.95);color:#dc2626;box-shadow:inset 0 0 0 1px rgba(243,199,183,0.8),0 0 12px -4px rgba(239,68,68,0.25)}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.nav-item .fr-badge{margin-left:auto;font-size:10px;font-weight:600;border-radius:6px;padding:1px 7px;background:rgba(239,107,74,0.1);color:#c2410c}
.nav-item .nav-priority{margin-left:auto;font-size:.65rem;padding:1px 6px;border-radius:4px;font-weight:600}
.nav-priority.p0{background:#fee2e2;color:#b91c1c}
.nav-priority.p1{background:#fef3c7;color:#92400e}
.nav-priority.p2{background:#dbeafe;color:#1e40af}
.nav-sep{height:1px;background:var(--border);margin:8px 24px}
#content-frame{flex:1;border:none;width:0;height:100vh;background:#f8f5f2}
@media(max-width:1024px){.sidebar{display:none}#content-frame{width:100%}}

</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="eyebrow">Security Platform</div>
    <div class="title">智能安全防护平台</div>

  <nav class="sidebar-nav">

      FR-06 智能体身份认证与可信声明
      <span class="fr-badge">P0</span></span></div>
    <div class="nav-item" data-page="fr07"><span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      FR-07 面向 Agent 的最小权限运行框架
      <span class="fr-badge">P0</span></span></div>
    <div class="nav-item" data-page="fr08"><span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6m8.66-13.5l-5.2 3m-6.92 4l-5.2 3M22.66 17.5l-5.2-3m-6.92-4l-5.2-3"/></svg>
      FR-08 细粒度动态访问控制
      <span class="fr-badge">P0</span></span></div>
    <div class="nav-item" data-page="fr09"><span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      FR-09 工具白名单与能力分域
      <span class="fr-badge">P0</span></span></div>
    <div class="nav-item" data-page="fr10"><span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
      FR-10 工具调用监控与预算限制
      <span class="fr-badge">P1</span></span></div>
    <div class="nav-item" data-page="fr11"><span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4"/><path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/></svg>
      FR-11 敏感操作审批与人工确认
      <span class="fr-badge">P0</span></span></div>
    <div class="nav-item" data-page="fr12"><span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
      FR-12 跨代理权限隔离
      <span class="fr-badge">P1</span></span></div>
    <div class="nav-section-label">全局视图</div>
    <div class="nav-item" data-page="agents"><span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      已注册 Agent 列表</span></div>
    <div class="nav-item" data-page="logs"><span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      权限与审批日志</span></div>

  </nav>
</aside>

<iframe id="content-frame" src="pages-5.2/fr06.html"></iframe>

<script>
// Sidebar navigation - iframe page loading
document.querySelectorAll('.nav-item[data-page]').forEach(function(item) {
  item.addEventListener('click', function() {
    var pageId = this.getAttribute('data-page');
    document.querySelectorAll('.nav-item[data-page]').forEach(function(n) {
      n.classList.remove('active');
    });
    this.classList.add('active');
    document.getElementById('content-frame').src = 'pages-5.2/' + pageId + '.html';
  });
});
</script>

</body>
</html>
