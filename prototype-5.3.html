<title>5.3 智能安全防护平台</title>
<style>
:root{--sidebar-w:260px;--accent:#ef4444;--accent-strong:#dc2626;--accent-coral:#ef6b4a;--accent-bg:rgba(239,68,68,0.1);--border:#eee5df;--text:#696363;--text-h:#171212}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{display:flex;font-family:"Segoe UI Variable","Segoe UI","SF Pro Text",system-ui,sans-serif;background:#f8f5f2;margin:0}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);height:100vh;display:flex;flex-direction:column;background:linear-gradient(180deg,rgba(255,255,255,0.94),rgba(255,248,244,0.92));border-right:1px solid #eadfd8;box-shadow:18px 0 50px -44px rgba(72,44,24,0.45);overflow:hidden;flex-shrink:0}
.sidebar-logo{height:80px;border-bottom:1px solid #efe2da;display:flex;flex-direction:column;justify-content:center;padding:0 24px;flex-shrink:0}
.sidebar-logo .eyebrow{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.22em;color:#b46c50;margin-bottom:2px}
.sidebar-logo .title{font-size:1.15rem;font-weight:700;background:linear-gradient(135deg,#ef6b4a,#dc2626);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sidebar-nav{flex:1;padding:12px;overflow-y:auto}
.sidebar-nav::-webkit-scrollbar{width:4px}
.sidebar-nav::-webkit-scrollbar-thumb{background:#d4c8c0;border-radius:4px}
.nav-section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.18em;color:#b46c50;padding:16px 16px 6px}
.nav-item{display:flex;align-items:center;gap:10px;border-radius:14px;padding:9px 14px;font-size:13px;font-weight:500;color:#6e6763;transition:all .2s;cursor:pointer;margin-bottom:1px}
.nav-item:hover{background:rgba(247,236,230,0.82);color:var(--text-h)}
.nav-item.active{background:rgba(255,241,235,0.95);color:#dc2626;box-shadow:inset 0 0 0 1px rgba(243,199,183,0.8),0 0 12px -4px rgba(239,68,68,0.25)}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.nav-item .fr-badge{margin-left:auto;font-size:10px;font-weight:600;border-radius:6px;padding:1px 7px;background:rgba(239,107,74,0.1);color:#c2410c}
.nav-item .nav-priority{margin-left:auto;font-size:.65rem;padding:1px 6px;border-radius:4px;font-weight:600}
.nav-priority.p0{background:#fee2e2;color:#b91c1c}
.nav-priority.p1{background:#fef3c7;color:#92400e}
.nav-priority.p2{background:#dbeafe;color:#1e40af}
.nav-sep{height:1px;background:var(--border);margin:8px 24px}
#content-frame{flex:1;border:none;width:0;height:100vh;background:#f8f5f2}
@media(max-width:1024px){.sidebar{display:none}#content-frame{width:100%}}

</style>
</head>

<script>
// Sidebar navigation - iframe page loading
document.querySelectorAll('.nav-item[data-page]').forEach(function(item) {
  item.addEventListener('click', function() {
    var pageId = this.getAttribute('data-page');
    document.querySelectorAll('.nav-item[data-page]').forEach(function(n) {
      n.classList.remove('active');
    });
    this.classList.add('active');
    document.getElementById('content-frame').src = 'pages-5.3/' + pageId + '.html';
  });
});
</script>
